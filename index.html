<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MAGIE ABSOLUE ✨🧚‍♀️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: "Comic Sans MS", cursive;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(45deg, red, yellow, cyan, magenta);
    background-size: 600% 600%;
    animation: bg 5s infinite alternate;
}

@keyframes bg {
    0% {background-position: left;}
    100% {background-position: right;}
}

#texte {
    font-size: 5em;
    color: white;
    cursor: pointer;
    text-shadow: 0 0 20px #fff, 0 0 50px #ff00ff;
    z-index: 10;
}

/* Fée */
.fee {
    position: absolute;
    width: 150px;
    left: 50%;
    top: 60%;
    transform: translateX(-50%);
    opacity: 0;
    animation: float 3s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translate(-50%,0); }
    50% { transform: translate(-50%,-30px); }
    100% { transform: translate(-50%,0); }
}

/* Paillettes */
.sparkle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
}

/* Arc-en-ciel qui tombe */
.rainbow {
    position: absolute;
    width: 6px;
    height: 20px;
    background: linear-gradient(red, orange, yellow, green, cyan, blue, violet);
    animation: fall linear infinite;
}

@keyframes fall {
    from { transform: translateY(-10px); }
    to { transform: translateY(110vh); }
}
</style>

</head>

<body>

<div id="texte">✨ BONJOUR ✨</div>

<!-- Fée -->

<img class="fee" id="fee" src="https://i.imgur.com/3ZQ3Z6M.png">

<script>
let texte = document.getElementById("texte");
let fee = document.getElementById("fee");

texte.onclick = () => {

    // TRANSFORMATION
    texte.innerHTML = "💥 TRANSFORMATION 💥";
    texte.style.transform = "scale(2) rotate(720deg)";
    texte.style.transition = "1s";

    // explosion massive
    for (let i = 0; i < 200; i++) {
        let s = document.createElement("div");
        s.className = "sparkle";
        s.style.background = "hsl(" + Math.random()*360 + ",100%,70%)";
        s.style.left = "50%";
        s.style.top = "50%";

        let angle = Math.random() * 2 * Math.PI;
        let dist = Math.random() * 400;

        let x = Math.cos(angle) * dist;
        let y = Math.sin(angle) * dist;

        s.animate([
            { transform: "translate(0,0)", opacity: 1 },
            { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
        ], { duration: 1200 });

        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1200);
    }

    // VOMI DE PAILLETTES (pluie intense)
    for (let i = 0; i < 150; i++) {
        let r = document.createElement("div");
        r.className = "rainbow";
        r.style.left = Math.random()*100 + "vw";
        r.style.animationDuration = (1 + Math.random()*2) + "s";
        document.body.appendChild(r);
    }

    // apparition fée
    setTimeout(() => {
        fee.style.opacity = 1;
    }, 800);

    // texte final
    setTimeout(() => {
        texte.innerHTML = "💖 AU REVOIR 💖";
        texte.style.transform = "scale(1)";
    }, 1500);
};
</script>

</body>
</html>
