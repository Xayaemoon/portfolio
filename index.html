<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bonjour Magique ✨</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(45deg, #ff00ff, #00ffff, #ffcc00, #ff0099);
        background-size: 400% 400%;
        animation: gradientBG 8s ease infinite;
        font-family: "Comic Sans MS", cursive, sans-serif;
        overflow: hidden;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    h1 {
        font-size: 4em;
        color: white;
        text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff, 0 0 30px #00ffff;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff, 0 0 30px #00ffff;
        }
        to {
            text-shadow: 0 0 20px #fff, 0 0 30px #ffcc00, 0 0 40px #ff0099;
        }
    }

    /* Paillettes */
    .sparkle {
        position: absolute;
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        box-shadow: 0 0 10px white, 0 0 20px #ff00ff;
        animation: fall linear infinite;
    }

    @keyframes fall {
        from {
            transform: translateY(-10px);
            opacity: 1;
        }
        to {
            transform: translateY(110vh);
            opacity: 0;
        }
    }
</style>
</head>
<body>

<h1>✨ Bonjour ✨</h1>

<script>
    // Générer des paillettes
    for (let i = 0; i < 50; i++) {
        let sparkle = document.createElement("div");
        sparkle.classList.add("sparkle");
        sparkle.style.left = Math.random() * 100 + "vw";
        sparkle.style.animationDuration = (2 + Math.random() * 3) + "s";
        sparkle.style.opacity = Math.random();
        document.body.appendChild(sparkle);
    }
</script>

</body>
</html>
